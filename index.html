<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voidtrap FastFlags - Ultimate Download Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #E6EAEF;
            overflow-x: hidden; 
            overflow-y: auto;
            perspective: 1200px; /* 3D 空間透視 */
        }

        /* 網頁滾動條自訂 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.02);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.08);
            border-radius: 99px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.15);
        }

        /* 1. 主面板與彈窗面板：重感毛玻璃與深邃陰影 */
        .glass-main-card {
            background: rgba(255, 255, 255, 0.38);
            backdrop-filter: blur(45px) saturate(160%);
            -webkit-backdrop-filter: blur(45px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.75);
            
            box-shadow: 
                0 40px 90px -10px rgba(0, 0, 0, 0.08),
                0 20px 40px -15px rgba(0, 0, 0, 0.06),
                inset 0 1px 1px rgba(255, 255, 255, 0.8),
                inset 0 -1px 2px rgba(0, 0, 0, 0.02);
                
            transform-style: preserve-3d;
            will-change: transform;
            transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 2. JSON 內框 */
        .glass-inner-box {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.35);
            
            box-shadow: 
                inset 0 6px 18px rgba(0, 0, 0, 0.03),
                inset 0 1px 2px rgba(0, 0, 0, 0.02),
                0 10px 30px rgba(255, 255, 255, 0.5);
        }

        /* 3. 複製與下載按鈕 */
        .glass-btn-premium {
            background: rgba(255, 255, 255, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            
            box-shadow: 
                0 10px 20px -5px rgba(0, 0, 0, 0.04),
                0 4px 8px -2px rgba(0, 0, 0, 0.02),
                inset 0 2px 4px rgba(255, 255, 255, 0.9);
                
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform, background-color, box-shadow;
        }

        .glass-btn-premium:hover {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 
                0 20px 30px -5px rgba(0, 0, 0, 0.08),
                0 8px 16px -4px rgba(0, 0, 0, 0.04),
                inset 0 2px 4px rgba(255, 255, 255, 1);
            transform: translateY(-3px) scale(1.02);
        }

        /* 4. 左上角彈窗玻璃材質 */
        .glass-toast {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 
                0 30px 60px -10px rgba(0, 0, 0, 0.08),
                0 15px 30px -10px rgba(0, 0, 0, 0.05),
                inset 0 2px 4px rgba(255, 255, 255, 0.8);
        }

        /* 水流背景 */
        .water-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #DEE5ED 0%, #F5F7FA 100%);
        }

        .fluid-blob {
            position: absolute;
            background: linear-gradient(180deg, rgba(214, 229, 247, 0.8) 0%, rgba(241, 245, 249, 0.3) 100%);
            filter: blur(70px);
            will-change: transform, border-radius;
            animation: fluidMove 25s infinite alternate cubic-bezier(0.45, 0, 0.55, 1);
        }

        @keyframes fluidMove {
            0% { transform: translate(0px, 0px) scale(1) rotate(0deg); border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%; }
            33% { transform: translate(70px, -50px) scale(1.08) rotate(120deg); border-radius: 70% 30% 52% 48% / 60% 40% 60% 40%; }
            66% { transform: translate(-30px, 50px) scale(0.96) rotate(240deg); border-radius: 50% 50% 30% 70% / 40% 60% 40% 60%; }
            100% { transform: translate(0px, 0px) scale(1) rotate(360deg); border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-16 px-4 md:px-8 relative">

    <div class="water-container">
        <div class="fluid-blob w-[650px] h-[650px] top-[-10%] left-[-5%]"></div>
        <div class="fluid-blob w-[750px] h-[750px] bottom-[-15%] right-[-5%]" style="animation-duration: 32s; animation-delay: -7s;"></div>
    </div>

    <div class="fixed top-10 right-10 z-40 flex flex-col items-end gap-2 select-none">
        <span class="text-[11px] tracking-widest text-gray-400 font-bold uppercase opacity-90">Download voidtrap</span>
        <button id="triggerModalBtn" class="glass-btn-premium text-xs font-bold px-6 py-3 rounded-full text-gray-600 tracking-wider cursor-pointer">
            DOWNLOAD
        </button>
    </div>

    <div id="mainCard" class="glass-main-card w-full max-w-3xl rounded-[3.5rem] p-10 md:p-14 relative my-auto">
        
        <div class="text-center mb-10 select-none">
            <span class="text-[11px] tracking-[0.4em] text-gray-400 font-bold uppercase block mb-3 opacity-80">VOIDTRAP EXCLUSIVE</span>
            <h1 class="text-4xl md:text-5xl font-extrabold text-gray-800 tracking-tighter">FastFlag</h1>
            <div class="h-[3px] w-10 bg-white/90 mx-auto mt-4 rounded-full shadow-sm"></div>
        </div>

        <div class="relative glass-inner-box rounded-[2.5rem] p-6 md:p-8 overflow-hidden">
            <button id="copyBtn" class="absolute top-5 right-5 glass-btn-premium text-gray-500 text-xs font-bold px-6 py-3 rounded-full cursor-pointer z-20 tracking-wider">
                COPY JSON
            </button>

            <div class="max-h-[450px] overflow-y-auto no-scrollbar pr-2">
                <pre class="text-[13px] font-mono text-gray-600/90 leading-relaxed selection:bg-white/60"><code id="jsonCode"></code></pre>
            </div>
        </div>

        <p class="text-center mt-8 text-[11px] text-gray-400 font-bold tracking-widest select-none opacity-70">
            ONLY FOR VOIDTRAP USER
        </p>
    </div>

    <div id="toast" class="fixed top-10 left-10 opacity-0 transform -translate-y-12 transition-all duration-700 cubic-bezier(0.175, 0.885, 0.32, 1.275) z-50 pointer-events-none">
        <div class="glass-toast px-7 py-4 rounded-2xl flex items-center gap-4">
            <div class="w-2 h-2 rounded-full bg-gray-400 animate-pulse"></div>
            <span class="text-xs font-bold text-gray-600 tracking-wider">COPIED TO CLIPBOARD</span>
        </div>
    </div>

    <div id="downloadModal" class="fixed inset-0 bg-gray-900/10 backdrop-blur-2xl z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-500 cubic-bezier(0.16, 1, 0.3, 1)">
        <div id="modalContent" class="glass-main-card w-full max-w-md p-10 md:p-12 rounded-[2.5rem] text-center transform scale-95 transition-transform duration-500 cubic-bezier(0.16, 1, 0.3, 1)">
            
            <span class="text-[11px] tracking-[0.4em] text-gray-400 font-bold uppercase block mb-3 opacity-90">NOTIFICATION</span>
            <h2 class="text-xl font-extrabold text-gray-800 tracking-tight leading-snug mb-8">
                Please download the latest version.
            </h2>
            
            <a href="https://github.com/voidstrap/Voidstrap/releases" class="glass-btn-premium block text-center text-xs font-bold px-8 py-4 rounded-full text-gray-600 tracking-widest mb-4 shadow-md">
                DOWNLOAD NOW
            </a>
            
            <button id="closeModalBtn" class="text-[11px] text-gray-400 font-bold tracking-widest hover:text-gray-600 transition-colors cursor-pointer uppercase">
                CLOSE WINDOW
            </button>
        </div>
    </div>

    <script>
        // 100% 原始數據，不做任何改動
        const fastFlagData = {
          "FFlagEnableLightAttachToPart": "False",
          "DFIntRaknetBandwidthPingSendEveryXSeconds": "1",
          "FFlagDebugDisableTelemetryEventIngest": "True",
          "FFlagDebugDisableTelemetryEphemeralCounter": "True",
          "FFlagFixScalingModelRendering": "False",
          "FFlagDebugSkyGray": "True",
          "DFStringLightstepHTTPTransportUrlHost": "null",
          "FFlagDebugCrashReports": "False",
          "FLogNetwork": "7",
          "FFlagEnableNewInput": "True",
          "FIntFullscreenTitleBarTriggerDelayMillis": "3600000",
          "FFlagEnableHumanoidLuaSideCaching": "False",
          "FFlagOptimizeNetworkTransport": "True",
          "FFlagCommitToGraphicsQualityFix": "True",
          "FFlagPreloadAllFonts": "False",
          "FFlagFixGraphicsQuality": "True",
          "FFlagUseDeferredContext": "False",
          "FStringGamesUrlPath": "/games/",
          "DFIntCSGLevelOfDetailSwitchingDistanceL23": "0",
          "DFStringLightstepToken": "null",
          "FIntRakNetResendBufferArrayLength": "128",
          "FFlagDebugGraphicsPreferD3D11": "True",
          "DFStringCrashUploadToBacktraceMacPlayerToken": "null",
          "FFlagFixMeshPartScaling": "False",
          "FFlagHandleAltEnterFullscreenManually": "False",
          "FFlagEnableTerrainFoliageOptimizations": "True",
          "FStringCoreScriptBacktraceErrorUploadToken": "null",
          "DFStringHttpPointsReporterUrl": "null",
          "FFlagUseNewAnimationSystem": "False",
          "DFIntCSGLevelOfDetailSwitchingDistanceL34": "0",
          "DFFlagDisableFastLogTelemetry": "True",
          "FFlagDebugDisplayFPS": "False",
          "FIntTerrainArraySliceSize": "0",
          "DFIntOptimizePingThreshold": "50",
          "DFFlagBrowserTrackerIdTelemetryEnabled": "False",
          "FFlagSimIslandizerManager": "false",
          "FFlagAnimatePhysics": "False",
          "DFFlagBaseNetworkMetrics": "False",
          "FFlagLuaAppSystemBar": "False",
          "DFIntCSGLevelOfDetailSwitchingDistanceL12": "0",
          "FIntRenderShadowIntensity": "0",
          "FFlagAdServiceEnabled": "False",
          "DFIntServerTickRate": "60",
          "FFlagOptimizeNetworkRouting": "True",
          "DFIntNetworkPrediction": "120",
          "FFlagDebugDisableTelemetryV2Stat": "True",
          "DFStringTelegrafHTTPTransportUrl": "null",
          "FFlagNewNetworking": "False",
          "DFIntPlayerNetworkUpdateRate": "60",
          "DFIntServerPhysicsUpdateRate": "60",
          "DFStringAltTelegrafHTTPTransportUrl": "null",
          "FFlagEnableTerrainOptimizations": "True",
          "DFIntCSGLevelOfDetailSwitchingDistance": "0",
          "DFFlagDebugPerfMode": "False",
          "DFIntNetworkLatencyTolerance": "1",
          "FFlagUseDynamicSun": "False",
          "DFIntNewRunningBaseAltitudeD": "45",
          "DFFlagDebugPauseVoxelizer": "True",
          "FFlagDebugDisableTelemetryV2Event": "True",
          "FFlagFastGPULightCulling3": "True",
          "FIntDebugForceMSAASamples": "1",
          "FFlagUseParticlesV2": "False",
          "DFStringCrashUploadToBacktraceWindowsPlayerToken": "null",
          "DFStringLightstepHTTPTransportUrlPath": "null",
          "DFIntTaskSchedulerTargetFps": "999999",
          "FFlagOptimizeServerTickRate": "True",
          "FFlagOptimizeNetwork": "True",
          "DFFlagDebugRenderForceTechnologyVoxel": "True",
          "DFIntS2PhysicsSenderRate": "250",
          "FFlagOptimizeEmotes": "False",
          "DFStringRobloxAnalyticsURL": "null",
          "FFlagDebugDisableTelemetryPoint": "True",
          "DFFlagDisableDPIScale": "True",
          "DFStringCrashUploadToBacktraceBaseUrl": "null",
          "DFIntPlayerNetworkUpdateQueueSize": "20",
          "FFlagDisablePostFx": "True",
          "FFlagEnableNewHeapSnapshots": "False",
          "DFIntClientLightingTechnologyChangedTelemetryHundredthsPercent": "0",
          "FFlagNewLightAttenuation": "True",
          "DFFlagTextureQualityOverrideEnabled": "True",
          "FFlagDebugDisableTelemetryV2Counter": "True",
          "DFIntLightstepHTTPTransportHundredthsPercent2": "0",
          "DFIntRakNetResendRttMultiple": "1",
          "DFIntRunningBaseOrientationP": "115",
          "DFIntDebugFRMQualityLevelOverride": "1",
          "FFlagTweenOptimizations": "True",
          "DFFlagEnableLightstepReporting2": "False",
          "DFStringAltHttpPointsReporterUrl": "null",
          "FFlagDebugGraphicsPreferD3D11FL10": "True",
          "FFlagDisableDPIScale": "True",
          "FFlagDebugDisableTelemetryEphemeralStat": "True",
          "DFIntConnectionMTUSize": "900",
          "DFIntTextureQualityOverride": "3",
          "FFlagUseUnifiedRenderStepped": "False",
          "FFlagTaskSchedulerLimitTargetFpsTo2402": "False",
          "FIntFontSizePadding": "4",
          "DFIntRenderingThrottleDelayInMS": "1",
          "DFStringTelemetryV2Url": "null"
        };

        const jsonString = JSON.stringify(fastFlagData, null, 2);
        document.getElementById('jsonCode').textContent = jsonString;

        // 進階 3D 玻璃傾斜效果
        const card = document.getElementById('mainCard');
        document.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const cardCenterX = rect.left + rect.width / 2;
            const cardCenterY = rect.top + rect.height / 2;
            const xAxis = (cardCenterX - e.clientX) / 45;
            const yAxis = (cardCenterY - e.clientY) / 45;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${-yAxis}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        // 按下 COPY 按鈕：左上角滑下彈出 Toast
        const copyBtn = document.getElementById('copyBtn');
        const toast = document.getElementById('toast');
        let timeoutId = null;

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(jsonString).then(() => {
                toast.classList.remove('opacity-0', '-translate-y-12', 'pointer-events-none');
                toast.classList.add('opacity-100', 'translate-y-0');
                
                if (timeoutId) clearTimeout(timeoutId);

                timeoutId = setTimeout(() => {
                    toast.classList.remove('opacity-100', 'translate-y-0');
                    toast.classList.add('opacity-0', '-translate-y-12', 'pointer-events-none');
                }, 2500);
            });
        });

        // 全螢幕彈窗控制邏輯
        const triggerModalBtn = document.getElementById('triggerModalBtn');
        const downloadModal = document.getElementById('downloadModal');
        const modalContent = document.getElementById('modalContent');
        const closeModalBtn = document.getElementById('closeModalBtn');

        // 開啟彈窗：全螢幕動態模糊與卡片放大回彈
        triggerModalBtn.addEventListener('click', () => {
            downloadModal.classList.remove('opacity-0', 'pointer-events-none');
            modalContent.classList.remove('scale-95');
            modalContent.classList.add('scale-100');
        });

        // 關閉彈窗
        closeModalBtn.addEventListener('click', () => {
            downloadModal.classList.add('opacity-0', 'pointer-events-none');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
        });
    </script>
</body>
</html>
