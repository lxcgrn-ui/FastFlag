<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voidtrap FastFlags - Liquid & Glass</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #F0F2F5;
            overflow: hidden;
        }

        /* 玻璃材質基礎 */
        .glass-base {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        /* 水流動態背景 (無圖標，純材質) */
        .water-surface {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(120deg, #e0e7ff 0%, #f8fafc 100%);
        }

        .water-wave {
            position: absolute;
            width: 200vw;
            height: 200vw;
            top: -150vw;
            left: -50vw;
            border-radius: 45%;
            background: rgba(255, 255, 255, 0.6);
            animation: wave 15s infinite linear;
        }

        .water-wave:nth-child(2) {
            border-radius: 40%;
            background: rgba(255, 255, 255, 0.4);
            animation: wave 18s infinite linear;
        }

        @keyframes wave {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 圓角玻璃按鈕 */
        .glass-btn {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transform: translateY(-2px);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="water-surface">
        <div class="water-wave"></div>
        <div class="water-wave"></div>
    </div>

    <div class="glass-base w-full max-w-3xl rounded-[3rem] p-12 relative">
        
        <div class="text-center mb-10">
            <span class="text-[10px] tracking-[0.3em] text-gray-400 font-bold uppercase block mb-3">VOIDTRAP EXCLUSIVE</span>
            <h1 class="text-4xl font-extrabold text-gray-800 tracking-tighter">FastFlag</h1>
            <div class="h-1 w-12 bg-white/80 mx-auto mt-4 rounded-full"></div>
        </div>

        <div class="relative glass-base rounded-[2rem] p-8 bg-white/20">
            <button id="copyBtn" class="absolute top-6 right-6 glass-btn text-gray-500 text-xs font-bold px-5 py-2.5 rounded-full cursor-pointer z-20">
                COPY JSON
            </button>

            <div class="max-h-[400px] overflow-y-auto no-scrollbar pr-4">
                <pre class="text-[13px] font-mono text-gray-600 leading-relaxed"><code id="jsonCode"></code></pre>
            </div>
        </div>

        <p class="text-center mt-8 text-[11px] text-gray-400 font-medium">
            ONLY FOR VOIDTRAP USER
        </p>
    </div>

    <div id="toast" class="fixed bottom-10 left-10 opacity-0 transform translate-y-4 transition-all duration-500 ease-out z-50">
        <div class="glass-base bg-white/80 px-6 py-4 rounded-2xl flex items-center gap-4">
            <div class="w-2 h-2 rounded-full bg-gray-400 animate-pulse"></div>
            <span class="text-sm font-bold text-gray-700">COPIED TO CLIPBOARD</span>
        </div>
    </div>

          "FIntFontSizePadding": "4",
          "DFIntRenderingThrottleDelayInMS": "1",
          "DFStringTelemetryV2Url": "null"
        };

        const jsonString = JSON.stringify(fastFlagData, null, 2);
        document.getElementById('jsonCode').textContent = jsonString;

        const copyBtn = document.getElementById('copyBtn');
        const toast = document.getElementById('toast');

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(jsonString).then(() => {
                toast.classList.remove('opacity-0', 'translate-y-4');
                toast.classList.add('opacity-100', 'translate-y-0');
                
                setTimeout(() => {
                    toast.classList.remove('opacity-100', 'translate-y-0');
                    toast.classList.add('opacity-0', 'translate-y-4');
                }, 3000);
            });
        });
    </script>
</body>
</html>
